<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--cyan:#00d4ff;--cyan2:#00ffea;--orange:#ff6a00;--orange2:#ffaa44;--dark:#020c1a;--panel:rgba(0,180,255,0.04);--border:rgba(0,212,255,0.18);}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:'Rajdhani',sans-serif;background:var(--dark);color:var(--cyan);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;cursor:crosshair;}
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(0,100,180,.18) 0%,transparent 70%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(255,100,0,.07) 0%,transparent 60%);}
.grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(0,212,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.04) 1px,transparent 1px);background-size:60px 60px;animation:gridDrift 40s linear infinite;}
@keyframes gridDrift{from{background-position:0 0}to{background-position:60px 60px}}
.scanline{position:fixed;inset:0;z-index:0;pointer-events:none;background:linear-gradient(transparent 50%,rgba(0,0,0,.03) 50%);background-size:100% 4px;}
.corner{position:fixed;width:50px;height:50px;z-index:5;pointer-events:none;border-color:rgba(0,212,255,.4);border-style:solid;}
.corner.tl{top:16px;left:16px;border-width:2px 0 0 2px}.corner.tr{top:16px;right:16px;border-width:2px 2px 0 0}
.corner.bl{bottom:16px;left:16px;border-width:0 0 2px 2px}.corner.br{bottom:16px;right:16px;border-width:0 2px 2px 0}
.side-data{position:fixed;top:50%;transform:translateY(-50%);z-index:3;pointer-events:none;display:flex;flex-direction:column;gap:14px;font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(0,212,255,.35);letter-spacing:1px;}
.side-data.left{left:20px;align-items:flex-start}.side-data.right{right:20px;align-items:flex-end}
.side-data span{animation:dataBlink 3s infinite}.side-data span:nth-child(2){animation-delay:.8s}.side-data span:nth-child(3){animation-delay:1.6s}
@keyframes dataBlink{0%,100%{opacity:.3}50%{opacity:.8}}

.main{position:relative;z-index:10;width:780px;max-width:98vw;display:flex;flex-direction:column;align-items:center;}

/* Boot overlay */
#bootOverlay{position:fixed;inset:0;z-index:100;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .8s;}
#bootOverlay.hidden{opacity:0;pointer-events:none;}
.boot-title{font-family:'Share Tech Mono',monospace;font-size:48px;letter-spacing:18px;color:var(--cyan);text-shadow:0 0 30px rgba(0,212,255,.7);}
.boot-log{font-family:'Share Tech Mono',monospace;font-size:12px;color:rgba(0,212,255,.6);letter-spacing:2px;text-align:center;line-height:2;}
.boot-bar-wrap{width:300px;height:2px;background:rgba(0,212,255,.15);border-radius:1px;overflow:hidden;}
.boot-bar{height:100%;background:var(--cyan);width:0%;transition:width .3s;box-shadow:0 0 8px var(--cyan);}

/* Arc Reactor */
.header-ring{position:relative;width:180px;height:180px;display:flex;align-items:center;justify-content:center;margin-bottom:-10px;}
.ring{position:absolute;border-radius:50%;border-style:solid;border-color:transparent;}
.ring1{width:180px;height:180px;border-width:1px;border-top-color:var(--cyan);border-right-color:rgba(0,212,255,.3);animation:spin 8s linear infinite;}
.ring2{width:152px;height:152px;border-width:1px;border-bottom-color:var(--cyan2);border-left-color:rgba(0,255,234,.2);animation:spin 5s linear infinite reverse;}
.ring3{width:124px;height:124px;border-width:2px;border-top-color:rgba(0,212,255,.6);border-right-color:transparent;border-bottom-color:rgba(0,212,255,.6);animation:spin 3s linear infinite;}
.ring4{width:96px;height:96px;border-width:1px;border-color:rgba(0,212,255,.15);animation:spin 12s linear infinite reverse;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.arc-core{width:70px;height:70px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,255,.9) 0%,rgba(0,120,200,.6) 40%,rgba(0,50,120,.3) 70%,transparent 100%);box-shadow:0 0 20px rgba(0,212,255,.8),0 0 40px rgba(0,212,255,.4),0 0 80px rgba(0,212,255,.2),inset 0 0 20px rgba(0,212,255,.3);animation:corePulse 3s ease-in-out infinite;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(255,255,255,.9);letter-spacing:1px;position:relative;z-index:2;}
@keyframes corePulse{0%,100%{box-shadow:0 0 20px rgba(0,212,255,.8),0 0 40px rgba(0,212,255,.4),0 0 80px rgba(0,212,255,.2),inset 0 0 20px rgba(0,212,255,.3);}50%{box-shadow:0 0 30px rgba(0,212,255,1),0 0 60px rgba(0,212,255,.6),0 0 120px rgba(0,212,255,.3),inset 0 0 30px rgba(0,212,255,.5);}}

.title-block{text-align:center;margin-bottom:14px;}
.title-main{font-family:'Share Tech Mono',monospace;font-size:48px;letter-spacing:18px;color:var(--cyan);text-shadow:0 0 30px rgba(0,212,255,.7),0 0 60px rgba(0,212,255,.3);animation:titleGlow 4s ease-in-out infinite;line-height:1;}
@keyframes titleGlow{0%,100%{text-shadow:0 0 20px rgba(0,212,255,.6),0 0 40px rgba(0,212,255,.2);}50%{text-shadow:0 0 40px rgba(0,212,255,1),0 0 80px rgba(0,212,255,.5),0 0 120px rgba(0,212,255,.2);}}
.title-sub{font-size:11px;letter-spacing:6px;color:rgba(0,212,255,.5);margin-top:6px;font-family:'Share Tech Mono',monospace;}

.status-bar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:8px 20px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--panel);margin-bottom:14px;font-family:'Share Tech Mono',monospace;font-size:11px;color:rgba(0,212,255,.6);letter-spacing:2px;}
.status-left{display:flex;align-items:center;gap:10px;}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--cyan2);box-shadow:0 0 8px var(--cyan2);animation:dotBlink 2s infinite;}
@keyframes dotBlink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

.waveform{display:flex;align-items:center;gap:3px;height:20px;margin-left:8px;}
.wbar{width:3px;background:var(--cyan);border-radius:1px;animation:wv .6s ease-in-out infinite;opacity:.5;}
.wbar:nth-child(1){height:6px;animation-delay:0s}.wbar:nth-child(2){height:12px;animation-delay:.1s}
.wbar:nth-child(3){height:18px;animation-delay:.2s}.wbar:nth-child(4){height:12px;animation-delay:.3s}.wbar:nth-child(5){height:6px;animation-delay:.4s}
@keyframes wv{0%,100%{transform:scaleY(.4);opacity:.3}50%{transform:scaleY(1);opacity:.8}}
.waveform.hidden{display:none;}.waveform.talking .wbar{opacity:1;animation-duration:.25s;}

.chat-panel{width:100%;background:var(--panel);border:1px solid var(--border);position:relative;clip-path:polygon(0 0,calc(100% - 20px) 0,100% 20px,100% 100%,20px 100%,0 calc(100% - 20px));}
.chat-panel::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,212,255,.03) 0%,transparent 50%);pointer-events:none;}
.panel-label{position:absolute;top:-1px;left:30px;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--cyan);background:var(--dark);padding:0 10px;border-left:1px solid rgba(0,212,255,.35);border-right:1px solid rgba(0,212,255,.35);}

.messages{height:260px;overflow-y:auto;padding:24px 20px 16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;}
.messages::-webkit-scrollbar{width:3px;}.messages::-webkit-scrollbar-thumb{background:rgba(0,212,255,.3);border-radius:2px;}

.msg{display:flex;gap:12px;align-items:flex-start;animation:msgSlide .3s ease-out;}
@keyframes msgSlide{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
.msg.user{flex-direction:row-reverse;animation:msgSlideR .3s ease-out;}
@keyframes msgSlideR{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
.av{width:32px;height:32px;flex-shrink:0;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:9px;font-weight:bold;}
.av.j{border:1px solid rgba(0,212,255,.5);color:var(--cyan);background:rgba(0,212,255,.08);box-shadow:0 0 8px rgba(0,212,255,.2);}
.av.u{border:1px solid rgba(255,106,0,.4);color:var(--orange2);background:rgba(255,106,0,.06);}
.bubble{max-width:72%;padding:10px 14px;font-size:14px;line-height:1.65;}
.msg.j .bubble{background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.2);color:rgba(200,240,255,.95);clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);}
.msg.user .bubble{background:rgba(255,106,0,.06);border:1px solid rgba(255,106,0,.2);color:rgba(255,220,180,.95);clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));text-align:right;}

.typing-bubble{display:flex;gap:5px;align-items:center;padding:12px 16px;background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.15);clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);}
.typing-bubble span{width:5px;height:5px;border-radius:50%;background:var(--cyan);animation:typBounce .9s infinite;}
.typing-bubble span:nth-child(2){animation-delay:.15s}.typing-bubble span:nth-child(3){animation-delay:.3s}
@keyframes typBounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

.input-area{border-top:1px solid var(--border);padding:14px 20px;display:flex;gap:10px;align-items:center;background:rgba(0,212,255,.02);}
.input-prefix{font-family:'Share Tech Mono',monospace;font-size:13px;color:rgba(0,212,255,.5);white-space:nowrap;}
.text-in{flex:1;background:transparent;border:none;border-bottom:1px solid rgba(0,212,255,.25);color:rgba(200,240,255,.95);font-family:'Rajdhani',sans-serif;font-size:15px;padding:4px 0;outline:none;transition:border-color .2s;letter-spacing:.5px;}
.text-in::placeholder{color:rgba(0,212,255,.25);}.text-in:focus{border-bottom-color:rgba(0,212,255,.6);}
.icon-btn{width:36px;height:36px;border-radius:3px;border:1px solid;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;flex-shrink:0;}
.icon-btn.send{border-color:rgba(0,212,255,.35);color:var(--cyan);}
.icon-btn.send:hover{background:rgba(0,212,255,.12);box-shadow:0 0 12px rgba(0,212,255,.3);border-color:rgba(0,212,255,.6);}
.icon-btn.mic{border-color:rgba(255,106,0,.35);color:var(--orange2);}
.icon-btn.mic.active{background:rgba(255,106,0,.2);border-color:rgba(255,106,0,.7);animation:micGlow .5s infinite alternate;}
@keyframes micGlow{from{box-shadow:0 0 8px rgba(255,106,0,.3)}to{box-shadow:0 0 20px rgba(255,106,0,.8)}}
.icon-btn:disabled{opacity:.3;cursor:not-allowed;}

.metrics{width:100%;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px;}
.metric{background:var(--panel);border:1px solid var(--border);padding:8px 12px;display:flex;flex-direction:column;gap:2px;clip-path:polygon(0 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%);}
.metric-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(0,212,255,.4);}
.metric-val{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--cyan);text-shadow:0 0 8px rgba(0,212,255,.5);}
.err{font-family:'Share Tech Mono',monospace;font-size:11px;color:#ff4444;text-align:center;margin-top:8px;letter-spacing:1px;}
</style>
</head>
<body>

<!-- Boot Overlay -->
<div id="bootOverlay">
  <div class="boot-title">J.A.R.V.I.S</div>
  <div class="boot-log" id="bootLog">INITIALIZING SYSTEMS...</div>
  <div class="boot-bar-wrap"><div class="boot-bar" id="bootBar"></div></div>
</div>

<div class="bg"></div>
<div class="grid"></div>
<div class="scanline"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>
<div class="side-data left">
  <span>SYS.VER 4.1.2</span><span>NODE: ACTIVE</span><span>ENC: AES-256</span><span>LAT: 12ms</span><span>UPTIME: 99.9%</span>
</div>
<div class="side-data right">
  <span>AI: ONLINE</span><span>MEM: 16.2GB</span><span>CPU: 12%</span><span>NET: SECURE</span><span>TEMP: 42°C</span>
</div>

<div class="main">
  <div class="header-ring">
    <div class="ring ring1"></div><div class="ring ring2"></div>
    <div class="ring ring3"></div><div class="ring ring4"></div>
    <div class="arc-core" id="arcCore">JARVIS</div>
  </div>
  <div class="title-block">
    <div class="title-main">J.A.R.V.I.S</div>
    <div class="title-sub">JUST A RATHER VERY INTELLIGENT SYSTEM</div>
  </div>
  <div class="status-bar">
    <div class="status-left">
      <div class="status-dot"></div>
      <span id="statusTxt">CONNECTING...</span>
      <div class="waveform hidden" id="waveform">
        <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
      </div>
    </div>
    <div id="clockEl" style="font-family:'Share Tech Mono',monospace;font-size:11px;color:rgba(0,212,255,.5);letter-spacing:2px;"></div>
  </div>
  <div class="chat-panel">
    <div class="panel-label">// COMMS.FEED</div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <span class="input-prefix">&gt;_</span>
      <input class="text-in" id="userIn" placeholder="Loading Jarvis..." disabled />
      <button class="icon-btn mic" id="micBtn" disabled>🎙</button>
      <button class="icon-btn send" id="sendBtn" disabled>⟶</button>
    </div>
  </div>
  <div class="metrics">
    <div class="metric"><div class="metric-label">CONNECTION</div><div class="metric-val" id="mConn">--</div></div>
    <div class="metric"><div class="metric-label">SESSION</div><div class="metric-val" id="mTime">00:00</div></div>
    <div class="metric"><div class="metric-label">STATUS</div><div class="metric-val" id="mStatus">BOOT</div></div>
    <div class="metric"><div class="metric-label">AUDIO</div><div class="metric-val" id="mAudio">--</div></div>
  </div>
  <div class="err" id="errEl"></div>
</div>

<script>
// ── CLOCK ──
function updateClock(){
  const n=new Date();
  document.getElementById('clockEl').textContent=n.toLocaleTimeString('en-US',{hour12:false})+' // '+n.toLocaleDateString('en-US',{month:'short',day:'2-digit'}).toUpperCase();
}
updateClock();setInterval(updateClock,1000);

// ── SESSION TIMER ──
let startTime=null;
setInterval(()=>{
  if(!startTime)return;
  const s=Math.floor((Date.now()-startTime)/1000),m=Math.floor(s/60),sec=s%60;
  document.getElementById('mTime').textContent=String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
},1000);

const statusTxt=document.getElementById('statusTxt');
const arcCore=document.getElementById('arcCore');
const waveform=document.getElementById('waveform');
const errEl=document.getElementById('errEl');
const messagesEl=document.getElementById('messages');
const userIn=document.getElementById('userIn');
const sendBtn=document.getElementById('sendBtn');
const micBtn=document.getElementById('micBtn');
const mConn=document.getElementById('mConn');
const mStatus=document.getElementById('mStatus');
const mAudio=document.getElementById('mAudio');
const bootOverlay=document.getElementById('bootOverlay');
const bootLog=document.getElementById('bootLog');
const bootBar=document.getElementById('bootBar');

function setArcColor(c){
  if(c==='orange') arcCore.style.background='radial-gradient(circle,rgba(255,150,0,.9) 0%,rgba(180,80,0,.5) 40%,transparent 100%)';
  else if(c==='red') arcCore.style.background='radial-gradient(circle,rgba(255,50,50,.8) 0%,transparent 70%)';
  else arcCore.style.background='';
}

function addMsg(role,text){
  const wrap=document.createElement('div');
  wrap.className='msg '+(role==='jarvis'?'j':'user');
  const av=document.createElement('div');
  av.className='av '+(role==='jarvis'?'j':'u');
  av.textContent=role==='jarvis'?'JAR':'USR';
  const bub=document.createElement('div');
  bub.className='bubble';bub.textContent=text;
  wrap.appendChild(av);wrap.appendChild(bub);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop=messagesEl.scrollHeight;
}

// ── AUDIO CONTEXT SETUP ──
let audioContextResumed=false;
async function resumeAudioContext(){
  if(audioContextResumed)return;
  try{
    const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended'){await audioCtx.resume();}
    audioContextResumed=true;
  }catch(e){console.error('AudioContext resume failed:',e);}
}
// Resume on user gesture
document.addEventListener('click',resumeAudioContext,{once:true});
document.addEventListener('keydown',resumeAudioContext,{once:true});

// ── BOOT SEQUENCE then AUTO CONNECT ──
async function boot(){
  const steps=[
    [10,'LOADING CORE MODULES...'],
    [25,'ESTABLISHING NEURAL LINK...'],
    [45,'FETCHING CREDENTIALS...'],
    [60,'CONNECTING TO LIVEKIT...'],
    [80,'INITIALIZING AUDIO...'],
    [95,'BRINGING JARVIS ONLINE...'],
  ];

  for(const [pct,msg] of steps){
    bootLog.textContent=msg;
    bootBar.style.width=pct+'%';
    await sleep(400);
  }

  // Auto-fetch token from server.py
  let tokenData;
  try{
    // const res=await fetch('http://localhost:3000/token');
    const res = await fetch('/token');
    if(!res.ok) throw new Error('server not reachable');
    tokenData=await res.json();
  }catch(e){
    bootLog.textContent='// ERROR: Run server.py first! (python server.py)';
    bootBar.style.background='#ff4444';
    errEl.textContent='// ERROR: Could not reach http://localhost:3000 — make sure server.py is running';
    bootOverlay.classList.add('hidden');
    statusTxt.textContent='SERVER OFFLINE';
    setArcColor('red');
    return;
  }

  bootBar.style.width='100%';
  bootLog.textContent='JARVIS ONLINE — STAND BY';
  await sleep(600);
  bootOverlay.classList.add('hidden');

  connectRoom(tokenData.url, tokenData.token);
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// ── LIVEKIT CONNECTION ──
let room=null,micTrack=null,micEnabled=false;

async function connectRoom(url,token){
  const {Room,RoomEvent,createLocalAudioTrack}=LivekitClient;
  room=new Room({adaptiveStream:true,dynacast:true});

  room.on(RoomEvent.Connected,()=>{
    statusTxt.textContent='JARVIS ONLINE';
    mConn.textContent='LIVE';
    mStatus.textContent='ACTIVE';
    startTime=Date.now();
    setArcColor('');
    userIn.disabled=false;
    userIn.placeholder='Talk to Jarvis or type here...';
    sendBtn.disabled=false;
    micBtn.disabled=false;
    addMsg('jarvis',"yo! I'm live — Jarvis online 🤙 talk to me bro, I'm listening!");
  });

  room.on(RoomEvent.Disconnected,()=>{
    statusTxt.textContent='DISCONNECTED';
    mConn.textContent='OFFLINE';
    mAudio.textContent='--';
    waveform.classList.add('hidden');
    setArcColor('red');
  });

  room.on(RoomEvent.TrackSubscribed,(track)=>{
    if(track.kind==='audio'){
      mAudio.textContent='RECV';
      waveform.classList.remove('hidden');
      waveform.classList.add('talking');
      mStatus.textContent='SPEAKING';
      const el=track.attach();
      el.autoplay=true;
      document.body.appendChild(el);
      track.on('ended',()=>{
        waveform.classList.remove('talking');
        mStatus.textContent='IDLE';
        mAudio.textContent='READY';
      });
    }
  });

  room.on(RoomEvent.DataReceived,(data)=>{
    try{
      const msg=JSON.parse(new TextDecoder().decode(data));
      if(msg.text||msg.transcript) addMsg('jarvis',msg.text||msg.transcript);
    }catch(e){
      const txt=new TextDecoder().decode(data);
      if(txt.trim()) addMsg('jarvis',txt);
    }
  });

  room.on(RoomEvent.ParticipantConnected,(p)=>{
    mStatus.textContent='AGENT IN';
  });

  try{
    await room.connect(url,token);
    const audioTrack=await createLocalAudioTrack({echoCancellation:true,noiseSuppression:true});
    await room.localParticipant.publishTrack(audioTrack);
    micTrack=audioTrack;micEnabled=true;
    micBtn.classList.add('active');
    mAudio.textContent='MIC ON';
  }catch(e){
    errEl.textContent='// CONNECTION ERROR: '+e.message;
    setArcColor('red');
    statusTxt.textContent='ERROR';
  }
}

// ── MIC TOGGLE ──
micBtn.onclick=async()=>{
  if(!micTrack)return;
  micEnabled=!micEnabled;
  if(micEnabled){await micTrack.unmute();micBtn.classList.add('active');mAudio.textContent='MIC ON';}
  else{await micTrack.mute();micBtn.classList.remove('active');mAudio.textContent='MIC OFF';}
};

// ── SEND TEXT ──
sendBtn.onclick=()=>sendText();
userIn.addEventListener('keypress',e=>{if(e.key==='Enter')sendText();});
async function sendText(){
  if(!room)return;
  const text=userIn.value.trim();if(!text)return;
  userIn.value='';
  addMsg('user',text);
  const encoded=new TextEncoder().encode(JSON.stringify({type:'user_message',text}));
  await room.localParticipant.publishData(encoded,{reliable:true});
}

// ── START ──
